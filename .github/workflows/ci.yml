name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'supabase/**'
      - '.env.local.example'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'supabase/**'
      - '.env.local.example'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify knowledge invariants
        run: npm run verify:knowledge

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          # Build-time env-var checks need these to pass; values are fake but valid-shape.
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          SITE_PASSWORD: ci-placeholder
